    <section class="contact-section">
        <h1>Lets work Together</h1>
        <p class="subtle">Got a project,question, or collab idea? Drop your details below and I'll get back to you within 24 hours.</p>

        <form action="" class="contact-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="Name">Name</label>
                    <input type="text" name="" id="" placeholder="Your full name">
                </div>
                <div class="form-group">
                    <label for="">Email</label>
                    <input type="email" name="" id="" placeholder="example@example.com">
                </div>
                
            </div>
            <div class="form-group">
                <label for="Name">Subject</label>
                <input type="text" name="" id="" placeholder="What is this about">
            </div>
            <div class="form-group">
                <label for="Name">Message</label>
                <textarea name="" id="" cols="30" rows="4" placeholder="Tell me your project"></textarea>
            </div>
            <button type="submit" class="btn-submit">
                Send Message
            </button>
        </form>
